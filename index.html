<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f6f8c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Tuman.Pro" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Tuman.Pro</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="logo.png" type="image/png" />
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel controls" aria-labelledby="app-title">
        <div class="brand-row">
          <img class="brand-mark" src="logo.png" alt="" />
          <div>
            <p class="eyebrow">ИП «Бауыржан»</p>
            <h1 id="app-title">Tuman.Pro</h1>
          </div>
        </div>

        <form id="quote-form" class="quote-form">
          <div class="field-grid">
            <label class="quote-number-field">
              <span>Номер КП</span>
              <div class="number-control">
                <button id="prev-quote-button" class="step-button" type="button" aria-label="Предыдущий номер КП">−</button>
                <input id="quote-number" name="quoteNumber" inputmode="numeric" autocomplete="off" />
                <button id="next-quote-button" class="step-button" type="button" aria-label="Следующий номер КП">+</button>
              </div>
            </label>

            <label>
              <span>Объект</span>
              <input id="object-name" name="objectName" autocomplete="organization" />
            </label>

            <label>
              <span>Город</span>
              <input id="city-name" name="cityName" autocomplete="address-level2" />
            </label>

            <fieldset class="type-select">
              <legend>Тип предложения</legend>
              <label class="checkbox-field">
                <input id="type-high" name="typeHigh" type="checkbox" checked />
                <span>Высокое давление</span>
              </label>
              <label class="checkbox-field">
                <input id="type-low" name="typeLow" type="checkbox" />
                <span>Низкое давление</span>
              </label>
            </fieldset>

            <fieldset class="pressure-inputs">
              <legend>Высокое давление</legend>
              <div class="pressure-grid">
                <label>
                  <span>Количество форсунок</span>
                  <input id="high-nozzle-count" name="highNozzleCount" type="number" inputmode="numeric" min="1" step="1" />
                </label>
                <label>
                  <span>Длина трубок, м</span>
                  <input id="high-pipe-length" name="highPipeLength" type="number" inputmode="decimal" min="0.1" step="0.1" />
                </label>
              </div>
            </fieldset>

            <fieldset class="pressure-inputs">
              <legend>Низкое давление</legend>
              <div class="pressure-grid">
                <label>
                  <span>Количество форсунок</span>
                  <input id="low-nozzle-count" name="lowNozzleCount" type="number" inputmode="numeric" min="1" step="1" />
                </label>
                <label>
                  <span>Длина трубок, м</span>
                  <input id="low-pipe-length" name="lowPipeLength" type="number" inputmode="decimal" min="0.1" step="0.1" />
                </label>
              </div>
            </fieldset>
          </div>
        </form>

        <div class="summary-strip" aria-live="polite">
          <div>
            <span>Фитинги</span>
            <strong id="summary-fittings">40</strong>
          </div>
          <div>
            <span>Насос</span>
            <strong id="summary-pump">4 л</strong>
          </div>
          <div>
            <span>Трубка</span>
            <strong id="summary-pipe">40 м</strong>
          </div>
          <div>
            <span>Итого</span>
            <strong id="summary-total">0 ₸</strong>
          </div>
        </div>

        <div class="action-row">
          <button id="print-button" class="primary-button" type="button">
            <span aria-hidden="true">PDF</span>
            <span>Печать</span>
          </button>
          <button id="download-pdf-button" class="pdf-file-button" type="button">
            <span aria-hidden="true">PDF</span>
            <span>Файл</span>
          </button>
          <button id="share-pdf-button" class="whatsapp-button" type="button">
            <span aria-hidden="true">WA</span>
            <span>WhatsApp</span>
          </button>
          <button id="download-word-button" class="secondary-button" type="button">
            <span aria-hidden="true">DOCX</span>
            <span>Файл Word</span>
          </button>
        </div>

        <details class="settings">
          <summary>Цены и формулы</summary>
          <div class="settings-section">
            <div class="settings-title">Высокое давление</div>
            <div class="settings-grid">
              <label>
                <span>Насос 1 л, ₸</span>
                <input id="price-high-pump-1" type="number" inputmode="numeric" min="0" step="1000" />
              </label>
              <label>
                <span>Насос 2 л, ₸</span>
                <input id="price-high-pump-2" type="number" inputmode="numeric" min="0" step="1000" />
              </label>
              <label>
                <span>Насос 3 л, ₸</span>
                <input id="price-high-pump-3" type="number" inputmode="numeric" min="0" step="1000" />
              </label>
              <label>
                <span>Насос 4 л, ₸</span>
                <input id="price-high-pump-4" type="number" inputmode="numeric" min="0" step="1000" />
              </label>
              <label>
                <span>Насос 5 л, ₸</span>
                <input id="price-high-pump-5" type="number" inputmode="numeric" min="0" step="1000" />
              </label>
              <label>
                <span>Переходник, ₸</span>
                <input id="price-high-adapter" type="number" inputmode="numeric" min="0" step="100" />
              </label>
              <label>
                <span>Трубка, ₸/м</span>
                <input id="price-high-pipe" type="number" inputmode="numeric" min="0" step="100" />
              </label>
              <label>
                <span>Фитинг, ₸</span>
                <input id="price-high-fitting" type="number" inputmode="numeric" min="0" step="100" />
              </label>
              <label>
                <span>Форсунка, ₸</span>
                <input id="price-high-nozzle" type="number" inputmode="numeric" min="0" step="100" />
              </label>
              <label>
                <span>Заглушка, ₸</span>
                <input id="price-high-plug" type="number" inputmode="numeric" min="0" step="100" />
              </label>
              <label>
                <span>Монтаж, ₸</span>
                <input id="price-high-installation" type="number" inputmode="numeric" min="0" step="1000" />
              </label>
              <label>
                <span>Фильтр, ₸</span>
                <input id="price-high-filter" type="number" inputmode="numeric" min="0" step="100" />
              </label>
            </div>
          </div>

          <div class="settings-section">
            <div class="settings-title">Низкое давление</div>
            <div class="settings-grid">
              <label>
                <span>Труба, ₸/м</span>
                <input id="price-low-pipe" type="number" inputmode="numeric" min="0" step="100" />
              </label>
              <label>
                <span>Переходник, ₸</span>
                <input id="price-low-adapter" type="number" inputmode="numeric" min="0" step="100" />
              </label>
              <label>
                <span>Фитинг, ₸</span>
                <input id="price-low-fitting" type="number" inputmode="numeric" min="0" step="100" />
              </label>
              <label>
                <span>Форсунка, ₸</span>
                <input id="price-low-nozzle" type="number" inputmode="numeric" min="0" step="100" />
              </label>
              <label>
                <span>Заглушка, ₸</span>
                <input id="price-low-plug" type="number" inputmode="numeric" min="0" step="100" />
              </label>
              <label>
                <span>Монтаж, ₸</span>
                <input id="price-low-installation" type="number" inputmode="numeric" min="0" step="1000" />
              </label>
              <label>
                <span>Насос 4 бара фикс., ₸</span>
                <input id="price-low-pump" type="number" inputmode="numeric" min="0" step="1000" />
              </label>
              <label>
                <span>Емкость 50 л, ₸</span>
                <input id="price-low-tank" type="number" inputmode="numeric" min="0" step="1000" />
              </label>
              <label>
                <span>Сантехподготовка, ₸</span>
                <input id="price-low-plumbing-prep" type="number" inputmode="numeric" min="0" step="1000" />
              </label>
            </div>
          </div>
          <button id="reset-settings" class="ghost-button" type="button">Сбросить цены</button>
        </details>

        <p id="status-line" class="status-line" role="status"></p>
      </section>

      <section class="quote-stage" aria-label="Предпросмотр КП">
        <div id="quote-preview" class="quote-preview"></div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
